<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AK360 Tours</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI,sans-serif;

background:#050816;
color:white;

padding:30px;
}

/* TITLE */
h1{
text-align:center;
margin-bottom:40px;

font-size:2.5rem;

background:linear-gradient(90deg,#00d4ff,#ff4df0);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* GRID */
.grid{
display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:25px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);

border-radius:18px;

overflow:hidden;

border:1px solid rgba(255,255,255,0.08);

transition:0.35s;
}

.card:hover{
transform:translateY(-10px);

border-color:#00d4ff;

box-shadow:0 0 25px rgba(0,212,255,0.25);
}

/* IMAGE */
.card img{
width:100%;
height:220px;
object-fit:cover;
}

/* CONTENT */
.content{
padding:20px;
}

.content h2{
margin-bottom:10px;
}

.content p{
color:#bfc8d8;
line-height:1.6;
}

/* BUTTON */
.btn{
display:inline-block;

margin-top:18px;

padding:12px 18px;

border-radius:10px;

text-decoration:none;
color:white;

background:
linear-gradient(90deg,#00d4ff,#ff4df0);
}

/* FOOTER */
footer{
margin-top:60px;
padding:30px 20px;
text-align:center;
color:#9ca9c3;
border-top:1px solid rgba(255,255,255,0.08);
}

footer p{
margin:8px 0;
}

/* MOBILE */
@media(max-width:768px){

body{
padding:20px;
}

h1{
font-size:2rem;
}

}

</style>
</head>

<body>

<h1 id="title">
TOURS
</h1>

<div class="grid" id="grid"></div>

<footer>

<p>
© 2026 AK360 Virtual Tours.
All rights reserved.
</p>

<p>
Unauthorized reproduction prohibited.
</p>

</footer>

<script>

const data={

gyms:[

{
title:"Modern Gym",
desc:"Premium 360° fitness walkthrough experience.",

img:"https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=800",

url:"/tour/g001/"
}

],

hotels:[

{
title:"Luxury Hotel",
desc:"5 star premium hotel virtual tour.",

img:"https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800",

url:"/tour/h001/"
}

],

restaurants:[

{
title:"Fine Dining",
desc:"Restaurant immersive experience.",

img:"https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800",

url:"/tour/r001/"
}

],

apartments:[

{
title:"Sunrise Residency",
desc:"Premium apartment virtual walkthrough.",

img:"https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=800",

url:"/tour/b001/"
}

],

flats:[

{
title:"Premium Flat",
desc:"Modern flat virtual experience.",

img:"https://images.unsplash.com/photo-1493809842364-78817add7ffb?w=800",

url:"/tour/f001/"
}

],

hospitals:[

{
title:"City Hospital",
desc:"Healthcare virtual tour.",

img:"https://images.unsplash.com/photo-1586773860418-d37222d8fce3?w=800",

url:"/tour/hp001/"
}

],

spas:[

{
title:"Luxury Spa",
desc:"Relaxing spa virtual experience.",

img:"https://images.unsplash.com/photo-1544161515-4ab6ce6db874?w=800",

url:"/tour/s001/"
}

],

salons:[

{
title:"Salon Experience",
desc:"Beauty salon virtual walkthrough.",

img:"https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?w=800",

url:"/tour/sl001/"
}

],

others:[

{
title:"Other Spaces",
desc:"Misc virtual tour experiences.",

img:"https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=800",

url:"/tour/o001/"
}

]

};

const params =
new URLSearchParams(window.location.search);

const cat = params.get("cat");

document.getElementById("title").innerText =
cat.toUpperCase() + " TOURS";

document.getElementById("grid").innerHTML =
data[cat].map(t => `

<div class="card">

<img src="${t.img}">

<div class="content">

<h2>${t.title}</h2>

<p>${t.desc}</p>

<a class="btn"
href="${t.url}">

View Tour

</a>

</div>

</div>

`).join("");

</script>

</body>
</html>
