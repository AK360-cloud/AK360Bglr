<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK360 Virtual Tours</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI;
background:#050816;
color:white;
overflow-x:hidden;
}

/* HERO */
.hero{
position:relative;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

/* 🌍 BRIGHTER EARTH + NEON GLOW FIX */
.earth{
position:absolute;
width:650px;
height:650px;
border-radius:50%;
background:url('https://upload.wikimedia.org/wikipedia/commons/7/7f/Rotating_earth_animated_transparent.gif');
background-size:cover;
background-position:center;

/* FIX: brighter + no dull look */
filter: brightness(1.4) contrast(1.2);

/* neon glow upgrade */
box-shadow:
0 0 80px #00d4ff,
0 0 160px #ff00e6,
0 0 220px rgba(0,212,255,0.4);

animation:float 8s infinite ease-in-out;
}

/* floating */
@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}
}

/* background glow layer */
.hero::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at center, rgba(0,212,255,0.15), transparent 60%),
radial-gradient(circle at top, rgba(255,0,230,0.12), transparent 70%);
}

/* LOGO FIX (BLUE + PINK NEON) */
.logo-text{
font-size:5rem;
font-weight:900;
background:linear-gradient(90deg,#00d4ff,#ff00e6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 10px #00d4ff,
0 0 25px #ff00e6,
0 0 45px #00d4ff;

letter-spacing:3px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
0%{filter:brightness(1);}
100%{filter:brightness(1.4);}
}

/* other unchanged */
.overlay{
position:absolute;
inset:0;
background:radial-gradient(circle,rgba(5,8,22,0.1),rgba(5,8,22,0.95));
}

.hero-content{
position:relative;
z-index:10;
}

.tagline{
margin-top:10px;
color:#b8b8c7;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:30px;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
text-align:center;
}

.card:hover{
transform:translateY(-10px);
border:1px solid #ff00e6;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

/* TOURS */
.tours{
padding:40px;
background:#0d1224;
}

.tour-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.tour-card{
background:rgba(255,255,255,0.05);
border-radius:15px;
overflow:hidden;
position:relative;
}

/* buttons */
.tour-btn{
display:block;
margin:10px;
padding:10px;
text-align:center;
background:linear-gradient(90deg,#00d4ff,#ff00e6);
color:white;
border-radius:10px;
text-decoration:none;
}

.details-btn{
position:absolute;
top:10px;
right:10px;
padding:6px 10px;
font-size:12px;
border-radius:20px;
color:#ff00e6;
border:1px solid #ff00e6;
background:rgba(0,0,0,0.6);
text-decoration:none;
}

/* WhatsApp */
.whatsapp{
display:block;
margin:10px;
padding:8px;
background:#25d366;
color:white;
text-align:center;
border-radius:8px;
text-decoration:none;
}

.section-title{
text-align:center;
margin:20px;
font-size:2rem;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<div class="earth"></div>
<div class="overlay"></div>
<h1 class="logo-text">AK360</h1>
</section>

<h2 class="section-title">Categories</h2>

<div class="grid">

<div class="card" onclick="load('apartments')">
<img src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=800">
<h3>Apartments</h3>
</div>

<div class="card" onclick="load('hotels')">
<img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800">
<h3>Hotels</h3>
</div>

<div class="card" onclick="load('gyms')">
<img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=800">
<h3>Gyms</h3>
</div>

</div>

<section class="tours">
<h2 class="section-title" id="title">Select Category</h2>
<div class="tour-grid" id="grid"></div>
</section>

<script>

const data = {

apartments:[
{
id:"b001",
title:"Luxury Apartment",
desc:"Premium 360° tour",
img:"https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=800",
tour:"https://ak360bglr1.pages.dev/tour/b001/",
map:"https://maps.google.com"
}
]

};

function load(cat){

document.getElementById("title").innerText = cat.toUpperCase();

document.getElementById("grid").innerHTML =
data[cat].map(t=>`

<div class="tour-card">

<a class="details-btn"
href="details.html?id=${t.id}&title=${encodeURIComponent(t.title)}">
✨ Get Details
</a>

<img src="${t.img}" style="width:100%;height:180px;object-fit:cover;">

<h3 style="padding:10px;">${t.title}</h3>

<p style="padding:0 10px;">${t.desc}</p>

<a class="tour-btn" href="${t.tour}" target="_blank">
View Tour
</a>

<!-- NEW CONTACT BUTTON -->
<a class="tour-btn"
style="background:linear-gradient(90deg,#ff00e6,#00d4ff);"
href="${t.map}" target="_blank">
📍 Contact / Location
</a>

</div>

`).join("");

}

</script>

</body>
</html>
