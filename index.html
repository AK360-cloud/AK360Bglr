<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK360 Virtual Tours</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Segoe UI;
background:#050816;
color:white;
}

/* HERO */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
text-align:center;
}

.earth{
position:absolute;
width:600px;
height:600px;
border-radius:50%;
background:url('https://upload.wikimedia.org/wikipedia/commons/7/7f/Rotating_earth_animated_transparent.gif');
background-size:cover;
filter:brightness(1.6) contrast(1.2);
animation:float 8s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}
}

.overlay{
position:absolute;
inset:0;
background:radial-gradient(circle,rgba(5,8,22,0.1),rgba(5,8,22,0.95));
}

/* LOGO */
.logo{
font-size:5rem;
font-weight:900;
color:#b400ff;
text-shadow:0 0 10px #b400ff,0 0 40px #7a00ff;
animation:neon 2.5s infinite alternate;
z-index:2;
position:relative;
}

@keyframes neon{
0%{text-shadow:0 0 10px #b400ff;}
100%{text-shadow:0 0 40px #7a00ff;}
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:30px;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
text-align:center;
}

.card:hover{
transform:translateY(-10px);
border:1px solid #b400ff;
}

.card img{
width:100%;
height:130px;
object-fit:cover;
}

.card h3{
padding:10px;
}

/* TOURS */
.tours{
padding:40px;
background:#0d1224;
}

.tour-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.tour-card{
position:relative;
background:rgba(255,255,255,0.05);
border-radius:15px;
overflow:hidden;
}

/* GET DETAILS */
.details-btn{
position:absolute;
top:10px;
right:10px;
padding:6px 10px;
font-size:12px;
color:#b400ff;
border:1px solid #b400ff;
border-radius:20px;
text-decoration:none;
background:rgba(0,0,0,0.6);
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
0%{box-shadow:0 0 5px #b400ff;}
100%{box-shadow:0 0 20px #7a00ff;}
}

.tour-img{
width:100%;
height:180px;
object-fit:cover;
}

.tour-content{
padding:15px;
}

.tour-btn{
display:block;
margin-top:10px;
text-align:center;
padding:10px;
background:linear-gradient(135deg,#b400ff,#7a00ff);
color:white;
border-radius:10px;
text-decoration:none;
}

.section-title{
text-align:center;
margin:20px 0;
font-size:2rem;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<div class="earth"></div>
<div class="overlay"></div>
<h1 class="logo">AK360</h1>
</section>

<h2 class="section-title">Explore Categories</h2>

<div class="grid">

<div class="card" onclick="load('gyms')">
<img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=800">
<h3>Gyms</h3>
</div>

<div class="card" onclick="load('hotels')">
<img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800">
<h3>Hotels</h3>
</div>

<div class="card" onclick="load('restaurants')">
<img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800">
<h3>Restaurants</h3>
</div>

<div class="card" onclick="load('apartments')">
<img src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=800">
<h3>Apartments</h3>
</div>

<div class="card" onclick="load('flats')">
<img src="https://images.unsplash.com/photo-1493809842364-78817add7ffb?w=800">
<h3>Flats</h3>
</div>

<div class="card" onclick="load('hospitals')">
<img src="https://images.unsplash.com/photo-1586773860418-d37222d8fce3?w=800">
<h3>Hospitals</h3>
</div>

<div class="card" onclick="load('spas')">
<img src="https://images.unsplash.com/photo-1544161515-4ab6ce6db874?w=800">
<h3>Spas</h3>
</div>

<div class="card" onclick="load('salons')">
<img src="https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?w=800">
<h3>Salons</h3>
</div>

<div class="card" onclick="load('others')">
<img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=800">
<h3>Others</h3>
</div>

</div>

<!-- TOURS -->
<section class="tours">
<h2 class="section-title" id="title">Select Category</h2>
<div class="tour-grid" id="grid"></div>
</section>

<script>

const data = {

gyms:[
{ id:"g1", title:"Modern Gym", desc:"360° gym tour", img:"https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=800" }
],

hotels:[
{ id:"h1", title:"Luxury Hotel", desc:"5 star hotel tour", img:"https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800" }
],

restaurants:[
{ id:"r1", title:"Fine Dining", desc:"Restaurant virtual tour", img:"https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800" }
],

apartments:[
{ id:"a1", title:"Luxury Apartment", desc:"Modern apartment tour", img:"https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=800" }
],

flats:[
{ id:"f1", title:"Premium Flat", desc:"Flat walkthrough", img:"https://images.unsplash.com/photo-1493809842364-78817add7ffb?w=800" }
],

hospitals:[
{ id:"hp1", title:"Hospital Tour", desc:"Healthcare facility tour", img:"https://images.unsplash.com/photo-1586773860418-d37222d8fce3?w=800" }
],

spas:[
{ id:"s1", title:"Luxury Spa", desc:"Relaxing spa tour", img:"https://images.unsplash.com/photo-1544161515-4ab6ce6db874?w=800" }
],

salons:[
{ id:"sl1", title:"Salon Tour", desc:"Beauty salon walkthrough", img:"https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?w=800" }
],

others:[
{ id:"o1", title:"Other Spaces", desc:"Misc virtual tour", img:"https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=800" }
]

};

function load(cat){

document.getElementById("title").innerText = cat.toUpperCase()+" TOURS";

document.getElementById("grid").innerHTML =
data[cat].map(t=>`
<div class="tour-card">

<a class="details-btn" href="details.html?id=${t.id}">
✨ Get Details
</a>

<img class="tour-img" src="${t.img}">

<div class="tour-content">
<h3>${t.title}</h3>
<p>${t.desc}</p>
<a class="tour-btn" href="#">View Tour</a>
</div>

</div>
`).join("");

}

</script>

</body>
</html>
