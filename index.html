<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AK360 Virtual Tours</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI,sans-serif;
background:#050816;
color:white;
overflow-x:hidden;
}

/* 🌍 HERO */
.hero{
position:relative;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

/* 🌍 EARTH */
.earth{
position:absolute;
width:700px;
height:700px;
border-radius:50%;

background:url('https://upload.wikimedia.org/wikipedia/commons/7/7f/Rotating_earth_animated_transparent.gif');
background-size:cover;

filter:brightness(1.8) contrast(1.2) saturate(1.4);

box-shadow:
0 0 120px rgba(0,212,255,0.5),
0 0 220px rgba(108,99,255,0.3);

animation:floatEarth 8s ease-in-out infinite;
}

@keyframes floatEarth{
0%{transform:translateY(0px);}
50%{transform:translateY(-15px) scale(1.03);}
100%{transform:translateY(0px);}
}

/* OVERLAY */
.overlay{
position:absolute;
inset:0;
background:radial-gradient(circle,rgba(5,8,22,0.1),rgba(5,8,22,0.95));
}

/* HERO TEXT */
.hero-content{
position:relative;
z-index:10;
}

.logo-text{
font-size:5rem;
font-weight:900;
color:#00f7ff;
text-shadow:
0 0 10px #00f7ff,
0 0 25px #00d4ff,
0 0 60px #6c63ff;
animation:neonPulse 2.5s infinite alternate;
}

@keyframes neonPulse{
0%{text-shadow:0 0 10px #00f7ff;}
100%{text-shadow:0 0 40px #00d4ff;}
}

/* SECTION */
.section-title{
text-align:center;
font-size:2.5rem;
margin:40px 0;
}

/* CATEGORIES */
.categories-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
}

.category-card{
background:rgba(255,255,255,0.05);
border-radius:20px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.category-card:hover{
transform:translateY(-10px);
border:1px solid #00d4ff;
}

.category-image{
width:100%;
height:160px;
object-fit:cover;
}

.category-name{
padding:15px;
text-align:center;
}

/* ACTIVE */
.category-card.active{
border:1px solid #00f7ff;
transform:scale(1.03);
}

/* TOURS */
.tours-section{
padding:50px 20px;
background:#0d1224;
}

.tours-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

/* TOUR CARD */
.tour-card{
position:relative;
background:rgba(255,255,255,0.05);
border-radius:20px;
overflow:hidden;
}

/* DETAILS BUTTON */
.details-btn{
position:absolute;
top:10px;
right:10px;
padding:6px 10px;
font-size:12px;
text-decoration:none;
color:#00f7ff;

background:rgba(0,0,0,0.6);
border:1px solid #00f7ff;
border-radius:20px;

animation:glow 1.5s infinite alternate;
}

@keyframes glow{
0%{box-shadow:0 0 5px #00d4ff;}
100%{box-shadow:0 0 20px #00f7ff;}
}

.tour-thumbnail{
width:100%;
height:200px;
object-fit:cover;
}

.tour-content{
padding:15px;
}

.tour-btn{
display:block;
margin-top:10px;
text-align:center;
padding:10px;
background:linear-gradient(135deg,#00d4ff,#6c63ff);
color:black;
font-weight:bold;
border-radius:10px;
text-decoration:none;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<div class="earth"></div>
<div class="overlay"></div>

<div class="hero-content">
<h1 class="logo-text">AK360</h1>
</div>
</section>

<h2 class="section-title">Explore Categories</h2>

<div class="categories-grid">

<div class="category-card" data-category="apartments">
<img class="category-image" src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=800">
<div class="category-name">Apartments</div>
</div>

<div class="category-card" data-category="hotel">
<img class="category-image" src="https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800">
<div class="category-name">Hotels</div>
</div>

</div>

<section class="tours-section">

<h2 class="section-title" id="title">Select Category</h2>

<div class="tours-grid" id="grid"></div>

</section>

<script>

const data={
apartments:[
{
title:"Luxury Apartment",
desc:"Premium 360° apartment tour",
img:"https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=800",
url:"#",
details:"details.html"
}
],
hotel:[
{
title:"Luxury Hotel",
desc:"5-star hotel walkthrough",
img:"https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800",
url:"#",
details:"details.html"
}
]
};

const cards=document.querySelectorAll(".category-card");
const grid=document.getElementById("grid");
const title=document.getElementById("title");

cards.forEach(c=>{
c.onclick=()=>{

cards.forEach(x=>x.classList.remove("active"));
c.classList.add("active");

let cat=c.dataset.category;
title.innerText=cat.toUpperCase()+" TOURS";

grid.innerHTML=data[cat].map(t=>`
<div class="tour-card">

<a class="details-btn" href="${t.details}">
✨ Get Details
</a>

<img class="tour-thumbnail" src="${t.img}">

<div class="tour-content">
<h3>${t.title}</h3>
<p>${t.desc}</p>
<a class="tour-btn" href="${t.url}">View Tour</a>
</div>

</div>
`).join("");

}
});

</script>

</body>
</html>
