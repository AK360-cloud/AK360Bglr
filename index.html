<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK360 Virtual Tours</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Segoe UI, sans-serif;
background:#050816;
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 20px;
z-index:1000;
display:flex;
justify-content:center;
background:rgba(5,8,22,0.6);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

header h1{
font-size:1.8rem;
font-weight:900;
background:linear-gradient(90deg,#00d4ff,#ff4df0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
letter-spacing:2px;
}

/* HERO */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
text-align:center;
}

.earth{
position:absolute;
width:650px;
height:650px;
border-radius:50%;
background:url('https://upload.wikimedia.org/wikipedia/commons/7/7f/Rotating_earth_animated_transparent.gif');
background-size:cover;
background-position:center;
filter:brightness(1.4) contrast(1.1);
animation:float 8s infinite ease-in-out;
opacity:0.95;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}
}

.overlay{
position:absolute;
inset:0;
background:radial-gradient(circle,rgba(5,8,22,0.1),rgba(5,8,22,0.95));
}

.logo{
font-size:4rem;
font-weight:900;
background:linear-gradient(90deg,#00d4ff,#ff4df0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
z-index:2;
position:relative;
}

/* GRID */
.section-title{
text-align:center;
margin:20px 0;
font-size:2rem;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
text-align:center;
border:1px solid rgba(255,255,255,0.08);
}

.card:hover{
transform:translateY(-8px);
border:1px solid #ff4df0;
}

.card img{
width:100%;
height:110px;
object-fit:cover;
}

.card h3{
padding:10px;
}

/* TOURS */
.tours{
padding:40px 20px;
background:#0d1224;
}

.tour-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.tour-card{
background:rgba(255,255,255,0.05);
border-radius:15px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.08);
transition:0.3s;
}

.tour-card:hover{
transform:translateY(-8px);
border-color:#00d4ff;
}

.tour-img{
width:100%;
height:180px;
object-fit:cover;
}

.tour-content{
padding:15px;
}

.tour-btn{
display:inline-block;
margin-top:10px;
padding:10px 15px;
border-radius:10px;
text-decoration:none;
color:white;
background:linear-gradient(90deg,#00d4ff,#ff4df0);
}

/* FOOTER */
footer{
padding:40px 20px;
text-align:center;
background:#03050d;
color:#b8c0d0;
}

footer a{
color:#00d4ff;
text-decoration:none;
}

.whatsapp{
position:fixed;
right:20px;
bottom:20px;
background:#25d366;
padding:12px 18px;
border-radius:50px;
color:white;
font-weight:bold;
text-decoration:none;
z-index:999;
}

@media(max-width:768px){
.earth{width:420px;height:420px;}
.logo{font-size:2.8rem;}
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
<h1>AK360</h1>
</header>

<!-- HERO -->
<section class="hero">
<div class="earth"></div>
<div class="overlay"></div>
<h1 class="logo">AK360</h1>
</section>

<h2 class="section-title">Explore Categories</h2>

<!-- CATEGORIES -->
<div class="grid">

<div class="card" onclick="load('gyms')">
<img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=800">
<h3>Gyms</h3>
</div>

<div class="card" onclick="load('hotels')">
<img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800">
<h3>Hotels</h3>
</div>

<div class="card" onclick="load('restaurants')">
<img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800">
<h3>Restaurants</h3>
</div>

<div class="card" onclick="load('apartments')">
<img src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=800">
<h3>Apartments</h3>
</div>

<div class="card" onclick="load('flats')">
<img src="https://images.unsplash.com/photo-1493809842364-78817add7ffb?w=800">
<h3>Flats</h3>
</div>

<div class="card" onclick="load('hospitals')">
<img src="https://images.unsplash.com/photo-1586773860418-d37222d8fce3?w=800">
<h3>Hospitals</h3>
</div>

<div class="card" onclick="load('spas')">
<img src="https://images.unsplash.com/photo-1544161515-4ab6ce6db874?w=800">
<h3>Spas</h3>
</div>

<div class="card" onclick="load('salons')">
<img src="https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?w=800">
<h3>Salons</h3>
</div>

<div class="card" onclick="load('others')">
<img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=800">
<h3>Others</h3>
</div>

</div>

<!-- TOURS -->
<section class="tours">
<h2 class="section-title" id="title">Select Category</h2>
<div class="tour-grid" id="grid"></div>
</section>

<!-- FOOTER -->
<footer>
<p>Digital Growth Specialist</p>
<p>📞 +91 7306639732</p>
<p>📍 Bangalore | India</p>

<p>
<a href="https://wa.me/917306639732" target="_blank">
Chat on WhatsApp
</a>
</p>
</footer>

<a class="whatsapp" href="https://wa.me/917306639732">WhatsApp</a>

<script>

const data = {

gyms:[
{ id:"g1", title:"Modern Gym", desc:"360° gym tour", img:"https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=800", url:"/tour/g001/" }
],

hotels:[
{ id:"h1", title:"Luxury Hotel", desc:"5 star hotel tour", img:"https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800", url:"/tour/h001/" }
],

restaurants:[
{ id:"r1", title:"Fine Dining Restaurant", desc:"Premium food experience", img:"https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800", url:"/tour/r001/" }
],

apartments:[
{ id:"a1", title:"Sunrise Residency Apartment", desc:"Luxury 3BHK apartment tour", img:"https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=800", url:"/tour/b001/" }
],

flats:[
{ id:"f1", title:"Premium Flat", desc:"Modern flat walkthrough", img:"https://images.unsplash.com/photo-1493809842364-78817add7ffb?w=800", url:"/tour/f001/" }
],

hospitals:[
{ id:"hp1", title:"City Care Hospital", desc:"Healthcare facility tour", img:"https://images.unsplash.com/photo-1586773860418-d37222d8fce3?w=800", url:"/tour/hp001/" }
],

spas:[
{ id:"s1", title:"Luxury Spa", desc:"Relaxing wellness spa", img:"https://images.unsplash.com/photo-1544161515-4ab6ce6db874?w=800", url:"/tour/s001/" }
],

salons:[
{ id:"sl1", title:"Premium Salon", desc:"Beauty salon experience", img:"https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?w=800", url:"/tour/sl001/" }
],

others:[
{ id:"o1", title:"Other Space", desc:"Misc virtual tour", img:"https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=800", url:"/tour/o001/" }
]

};

function load(cat){

document.getElementById("title").innerText =
cat.toUpperCase()+" TOURS";

document.getElementById("grid").innerHTML =
data[cat].map(t=>`
<div class="tour-card">

<img class="tour-img" src="${t.img}">

<div class="tour-content">
<h3>${t.title}</h3>
<p>${t.desc}</p>

<a class="tour-btn" href="${t.url}">
View Tour
</a>

</div>
</div>
`).join("");

}

</script>

</body>
</html>
