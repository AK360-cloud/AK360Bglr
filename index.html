<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK360 Virtual Tours</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI;
background:#050816;
color:white;
overflow-x:hidden;
}

/* HERO */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
text-align:center;
overflow:hidden;
}

/* 🌍 EARTH (MOBILE FRIENDLY + BRIGHT) */
.earth{
position:absolute;
width:min(600px,90vw);
height:min(600px,90vw);
border-radius:50%;

background:url('https://upload.wikimedia.org/wikipedia/commons/7/7f/Rotating_earth_animated_transparent.gif');
background-size:cover;
background-position:center;

filter:brightness(1.4) contrast(1.2);

box-shadow:
0 0 80px rgba(0,212,255,0.5),
0 0 140px rgba(255,79,216,0.3);

animation:float 8s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}
}

/* overlay */
.hero::before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at center, rgba(0,212,255,0.15), transparent 60%),
radial-gradient(circle at top, rgba(255,79,216,0.10), transparent 70%);
}

/* 💙🩷 AK360 CLEAN GRADIENT (NO NEON) */
.logo{
font-size:5rem;
font-weight:900;

background:linear-gradient(90deg,#00d4ff,#ff4fd8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

letter-spacing:2px;
z-index:2;
position:relative;
text-shadow:none;
}

/* SECTION TITLE */
.section-title{
text-align:center;
margin:20px;
font-size:1.8rem;
}

/* CATEGORY GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:15px;
overflow:hidden;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
border:1px solid rgba(255,79,216,0.5);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

/* TOURS */
.tours{
padding:30px 15px;
background:#0d1224;
}

.tour-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:15px;
}

/* TOUR CARD */
.tour-card{
background:rgba(255,255,255,0.05);
border-radius:15px;
overflow:hidden;
}

/* BUTTONS */
.tour-btn{
display:block;
margin:10px;
padding:10px;
text-align:center;
background:linear-gradient(90deg,#00d4ff,#ff4fd8);
color:white;
border-radius:10px;
text-decoration:none;
}

/* DETAILS BUTTON */
.details-btn{
position:absolute;
top:10px;
right:10px;
padding:6px 10px;
font-size:12px;
border-radius:20px;
color:#ff4fd8;
border:1px solid #ff4fd8;
background:rgba(0,0,0,0.6);
text-decoration:none;
}

/* CONTACT SECTION */
.contact{
margin-top:40px;
padding:25px;
text-align:center;
background:#050816;
border-top:1px solid rgba(255,255,255,0.1);
}

.whatsapp{
display:inline-block;
margin-top:10px;
padding:12px 18px;
background:#25d366;
color:white;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<div class="earth"></div>
<h1 class="logo">AK360</h1>
</section>

<h2 class="section-title">Explore Categories</h2>

<div class="grid">

<div class="card" onclick="load('gyms')">
<img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=800">
<h3>Gyms</h3>
</div>

<div class="card" onclick="load('hotels')">
<img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800">
<h3>Hotels</h3>
</div>

<div class="card" onclick="load('restaurants')">
<img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800">
<h3>Restaurants</h3>
</div>

<div class="card" onclick="load('apartments')">
<img src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=800">
<h3>Apartments</h3>
</div>

<div class="card" onclick="load('flats')">
<img src="https://images.unsplash.com/photo-1493809842364-78817add7ffb?w=800">
<h3>Flats</h3>
</div>

<div class="card" onclick="load('hospitals')">
<img src="https://images.unsplash.com/photo-1586773860418-d37222d8fce3?w=800">
<h3>Hospitals</h3>
</div>

<div class="card" onclick="load('spas')">
<img src="https://images.unsplash.com/photo-1544161515-4ab6ce6db874?w=800">
<h3>Spas</h3>
</div>

<div class="card" onclick="load('salons')">
<img src="https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?w=800">
<h3>Salons</h3>
</div>

</div>

<!-- TOURS -->
<section class="tours">
<h2 class="section-title" id="title">Select Category</h2>
<div class="tour-grid" id="grid"></div>

<!-- CONTACT -->
<div class="contact">
<h3>📞 Contact AK360</h3>
<p>+91 7306639732</p>

<a class="whatsapp"
href="https://wa.me/917306639732?text=Hi%20AK360%20I%20want%20360%20tour"
target="_blank">
💬 WhatsApp Us
</a>
</div>

</section>

<script>

const data = {

gyms:[
{ id:"g1", title:"Modern Gym", desc:"360° Gym Tour", img:"https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=800", url:"https://ak360bglr1.pages.dev/tour/g001/" }
],

hotels:[
{ id:"h1", title:"Luxury Hotel", desc:"5 Star Experience", img:"https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800", url:"https://ak360bglr1.pages.dev/tour/h001/" }
],

apartments:[
{ id:"a1", title:"Luxury Apartment", desc:"Premium Tour", img:"https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=800", url:"https://ak360bglr1.pages.dev/tour/b001/" }
]

};

function load(cat){

document.getElementById("title").innerText = cat.toUpperCase()+" TOURS";

document.getElementById("grid").innerHTML =
data[cat].map(t=>`

<div class="tour-card">

<a class="details-btn" href="details.html?id=${t.id}">
✨ Get Details
</a>

<img src="${t.img}" style="width:100%;height:180px;object-fit:cover;">

<div style="padding:10px;">
<h3>${t.title}</h3>
<p>${t.desc}</p>

<a class="tour-btn" href="${t.url}" target="_blank">
View Tour (360°)
</a>
</div>

</div>

`).join("");

}

</script>

</body>
</html>
