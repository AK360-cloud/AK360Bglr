<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Details</title>

<style>

body{
font-family:Segoe UI;
background:#050816;
color:white;
padding:40px;
}

.box{
max-width:700px;
margin:auto;
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
}

h1{
color:#b400ff;
text-shadow:0 0 20px #b400ff;
}

p{
color:#b8b8c7;
line-height:1.7;
}

</style>
</head>

<body>

<div class="box" id="content"></div>

<script>

const tours = {
g1:{title:"Gym Tour",price:"₹1,00,000",desc:"Modern gym setup",contact:"+91 7306639732"},
h1:{title:"Hotel Tour",price:"₹5,00,000",desc:"Luxury hotel walkthrough",contact:"+91 7306639732"},
r1:{title:"Restaurant Tour",price:"₹2,00,000",desc:"Fine dining experience",contact:"+91 7306639732"},
a1:{title:"Apartment Tour",price:"₹2,50,000",desc:"Luxury apartment",contact:"+91 7306639732"},
f1:{title:"Flat Tour",price:"₹2,20,000",desc:"Modern flat space",contact:"+91 7306639732"},
hp1:{title:"Hospital Tour",price:"₹3,00,000",desc:"Healthcare facility",contact:"+91 7306639732"},
s1:{title:"Spa Tour",price:"₹1,50,000",desc:"Relaxing spa experience",contact:"+91 7306639732"},
sl1:{title:"Salon Tour",price:"₹1,20,000",desc:"Beauty salon setup",contact:"+91 7306639732"},
o1:{title:"Other Tour",price:"₹1,00,000",desc:"Misc spaces",contact:"+91 7306639732"}
};

const id = new URLSearchParams(window.location.search).get("id");

const t = tours[id];

document.getElementById("content").innerHTML = `
<h1>${t.title}</h1>
<p><b>Price:</b> ${t.price}</p>
<p><b>Description:</b> ${t.desc}</p>
<p><b>Contact:</b> ${t.contact}</p>
`;

</script>

</body>
</html>
